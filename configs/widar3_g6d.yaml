data:
  root: /home/ccl/data/csi-carat
  dataset: widar3g6d
  raw_root: /home/ccl/data/csi-carat/widar3/widar3g6d/raw
  cache_root: /home/ccl/data/csi-carat/widar3/widar3g6d/cache
  train_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/cache/widar3-g6_csi_domain_train_cache.pkl
  test_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/cache/widar3-g6_csi_domain_test_cache.pkl

preprocess:
  split: BOTH
  min_packets: 120
  max_packets: 220

clean:
  clean_cache_root: /home/ccl/data/csi-carat/widar3/widar3g6d/clean_cache
  train_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/clean_cache/widar3-g6_clean_train_cache.pkl
  test_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/clean_cache/widar3-g6_clean_test_cache.pkl
  target_packets: 220
  window_size: 128
  stride: 64
  hampel_window: 5
  hampel_n_sigmas: 3.0
  instance_normalize: true

features:
  feature_cache_root: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache
  train_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache/widar3-g6_features_train_cache.pkl
  test_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache/widar3-g6_features_test_cache.pkl
  branches:
    - amplitude
    - phase_difference
    - doppler_spectrogram
  n_fft: 32
  hop_length: 16
  window: hann

wicbr_features:
  wicbr_cache_root: /home/ccl/data/csi-carat/widar3/widar3g6d/wicbr_cache
  train_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/wicbr_cache/widar3-g6_wicbr_train_cache.pkl
  test_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/wicbr_cache/widar3-g6_wicbr_test_cache.pkl
  image_size: 224
  packet_downsample: 1
  min_packets: 128
  max_packets: 6000
  sample_rate: 1000.0
  frequency_bound: 60.0
  n_fft: 128
  hop_length: 32

reports:
  feature_output_dir: results/widar3_features

model:
  input_subcarriers: 30
  window_size: 128
  feature_dim: 64
  factor_dim: 32
  num_classes: 6
  num_domains: 7
  grl_lambda: 1.0

train:
  batch_size: 32
  epochs: 100
  learning_rate: 0.0001
  seed: 3407

erm:
  train_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache/widar3-g6_features_train_cache.pkl
  batch_size: 64
  max_steps: 20
  learning_rate: 0.001

erm_baseline:
  train_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache/widar3-g6_features_train_cache.pkl
  test_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache/widar3-g6_features_test_cache.pkl
  output_dir: results/widar3_erm
  run_name: amplitude_only
  batch_size: 256
  epochs: 10
  max_steps_per_epoch: 0
  learning_rate: 0.001
  weight_decay: 0.0001
  seed: 3407

multibranch_erm:
  train_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache/widar3-g6_features_train_cache.pkl
  test_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache/widar3-g6_features_test_cache.pkl
  output_dir: results/widar3_erm
  run_name: multibranch
  branches:
    - amplitude
    - phase_difference
    - doppler_spectrogram
  batch_size: 256
  epochs: 10
  learning_rate: 0.001
  weight_decay: 0.0001
  seed: 3407

risk_multibranch_erm:
  train_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache/widar3-g6_features_train_cache.pkl
  test_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache/widar3-g6_features_test_cache.pkl
  output_dir: results/widar3_erm
  run_name: risk_multibranch
  branches:
    - amplitude
    - phase_difference
    - doppler_spectrogram
  batch_size: 256
  epochs: 10
  learning_rate: 0.001
  weight_decay: 0.0001
  risk_weight: 0.5
  risk_eta: 2.0
  seed: 3407

risk_sweep:
  output_dir: results/widar3_erm
  risk_weights: 0.25,0.5,1.0
  risk_etas: 2.0
  batch_size: 256
  epochs: 10
  learning_rate: 0.001
  weight_decay: 0.0001
  seed: 3407

transformer_multibranch:
  train_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache/widar3-g6_features_train_cache.pkl
  test_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache/widar3-g6_features_test_cache.pkl
  output_dir: results/widar3_erm
  run_name: transformer_multibranch
  batch_size: 128
  epochs: 10
  learning_rate: 0.0003
  weight_decay: 0.0001
  feature_dim: 96
  num_heads: 4
  num_layers: 2
  dropout: 0.1
  seed: 3407

risk_transformer_multibranch:
  train_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache/widar3-g6_features_train_cache.pkl
  test_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache/widar3-g6_features_test_cache.pkl
  output_dir: results/widar3_erm
  run_name: risk_transformer_multibranch
  batch_size: 128
  epochs: 10
  learning_rate: 0.0003
  weight_decay: 0.0001
  feature_dim: 96
  num_heads: 4
  num_layers: 2
  dropout: 0.1
  risk_weight: 0.25
  risk_eta: 2.0
  seed: 3407

wicbr:
  train_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/wicbr_cache/widar3-g6_wicbr_train_cache.pkl
  test_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/wicbr_cache/widar3-g6_wicbr_test_cache.pkl
  output_dir: results/widar3_wicbr
  run_name: wicbr
  backbone: resnet18
  batch_size: 10
  epochs: 30
  learning_rate: 0.0001
  weight_decay: 0.0001
  contrastive_weight: 0.1
  temperature: 0.1
  source_val_fraction: 0.1
  source_val_strategy: leave_one_domain
  source_val_domain: -1
  selection_split: source_val
  selection_metric: macro_f1
  seed: 3407

wicbr_ablation:
  output_dir: results/widar3_wicbr_ablation
  runs: phase_only,dfs_only,no_fusion,no_contrastive
  backbone: resnet18
  batch_size: 10
  epochs: 30
  learning_rate: 0.0001
  weight_decay: 0.0001
  source_val_fraction: 0.1
  source_val_strategy: leave_one_domain
  source_val_domain: -1
  selection_split: source_val
  selection_metric: macro_f1
  seed: 3407

wicbr_carat:
  train_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/wicbr_cache/widar3-g6_wicbr_train_cache.pkl
  test_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/wicbr_cache/widar3-g6_wicbr_test_cache.pkl
  output_dir: results/widar3_wicbr_carat
  run_name: wicbr_carat
  backbone: resnet18
  branch_mode: both
  use_fusion: true
  batch_size: 10
  epochs: 30
  learning_rate: 0.0001
  weight_decay: 0.0001
  factor_dim: 32
  risk_weight: 0.25
  risk_eta: 2.0
  domain_weight: 0.1
  disentangle_weight: 0.1
  contrastive_weight: 0.1
  temperature: 0.1
  source_val_fraction: 0.1
  source_val_strategy: leave_one_domain
  source_val_domain: -1
  selection_split: source_val
  selection_metric: macro_f1
  seed: 3407

domain8_focus:
  output_dir: results/widar3_domain8_focus
  candidates: wicbr_full,phase_only,no_fusion,wicbr_carat
  backbone: resnet18
  batch_size: 10
  epochs: 30
  learning_rate: 0.0001
  weight_decay: 0.0001
  source_val_strategy: leave_one_domain
  source_val_domain: -1
  selection_split: source_val
  selection_metric: macro_f1
  target_domain: 8
  seed: 3407

tta:
  batch_size: 1
  learning_rate: 0.00001
  update:
    - layer_norm_affine
    - adapter
    - gate
    - temperature
