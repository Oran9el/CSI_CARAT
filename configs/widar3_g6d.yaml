data:
  root: /home/ccl/data/csi-carat
  dataset: widar3g6d
  raw_root: /home/ccl/data/csi-carat/widar3/widar3g6d/raw
  cache_root: /home/ccl/data/csi-carat/widar3/widar3g6d/cache
  train_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/cache/widar3-g6_csi_domain_train_cache.pkl
  test_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/cache/widar3-g6_csi_domain_test_cache.pkl

preprocess:
  split: BOTH
  min_packets: 120
  max_packets: 220

clean:
  clean_cache_root: /home/ccl/data/csi-carat/widar3/widar3g6d/clean_cache
  train_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/clean_cache/widar3-g6_clean_train_cache.pkl
  test_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/clean_cache/widar3-g6_clean_test_cache.pkl
  target_packets: 220
  window_size: 128
  stride: 64
  hampel_window: 5
  hampel_n_sigmas: 3.0
  instance_normalize: true

features:
  feature_cache_root: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache
  train_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache/widar3-g6_features_train_cache.pkl
  test_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache/widar3-g6_features_test_cache.pkl
  branches:
    - amplitude
    - phase_difference
    - doppler_spectrogram
  n_fft: 32
  hop_length: 16
  window: hann

reports:
  feature_output_dir: results/widar3_features

model:
  input_subcarriers: 30
  window_size: 128
  feature_dim: 64
  factor_dim: 32
  num_classes: 6
  num_domains: 7
  grl_lambda: 1.0

train:
  batch_size: 32
  epochs: 100
  learning_rate: 0.0001
  seed: 3407

erm:
  train_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache/widar3-g6_features_train_cache.pkl
  batch_size: 64
  max_steps: 20
  learning_rate: 0.001

erm_baseline:
  train_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache/widar3-g6_features_train_cache.pkl
  test_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache/widar3-g6_features_test_cache.pkl
  output_dir: results/widar3_erm
  run_name: amplitude_only
  batch_size: 256
  epochs: 10
  max_steps_per_epoch: 0
  learning_rate: 0.001
  weight_decay: 0.0001
  seed: 3407

multibranch_erm:
  train_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache/widar3-g6_features_train_cache.pkl
  test_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache/widar3-g6_features_test_cache.pkl
  output_dir: results/widar3_erm
  run_name: multibranch
  branches:
    - amplitude
    - phase_difference
    - doppler_spectrogram
  batch_size: 256
  epochs: 10
  learning_rate: 0.001
  weight_decay: 0.0001
  seed: 3407

risk_multibranch_erm:
  train_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache/widar3-g6_features_train_cache.pkl
  test_cache: /home/ccl/data/csi-carat/widar3/widar3g6d/feature_cache/widar3-g6_features_test_cache.pkl
  output_dir: results/widar3_erm
  run_name: risk_multibranch
  branches:
    - amplitude
    - phase_difference
    - doppler_spectrogram
  batch_size: 256
  epochs: 10
  learning_rate: 0.001
  weight_decay: 0.0001
  risk_weight: 0.5
  risk_eta: 2.0
  seed: 3407

tta:
  batch_size: 1
  learning_rate: 0.00001
  update:
    - layer_norm_affine
    - adapter
    - gate
    - temperature
